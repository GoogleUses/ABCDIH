


<!DOCTYPE html>
<html lang="en-us">
<head>
<meta charset="utf-8"/>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8"/>
<meta name="viewport" content="width=device-width, height=device-height, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"/>
<title>Бой с Мемами 2</title>
<link rel="shortcut icon" href="https://cdn.jsdelivr.net/gh/ftbaldana/su55s@main/TemplateData/favicon.ico"/>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/ftbaldana/su55s@main/TemplateData/style.css"/>
</head>
<body class="dark">
<div id="game-shell">
  <div id="unity-container" class="unity-desktop">
    <canvas id="unity-canvas" width="1920" height="1080"></canvas>
    <div id="loading-cover" style="display:none;">
      <div id="unity-loading-bar">
        <div id="unity-logo"><img src="https://cdn.jsdelivr.net/gh/ftbaldana/su55s@main/logo.png" alt="logo"/></div>
        <div id="unity-progress-bar-empty" style="display:none;">
          <div id="unity-progress-bar-full"></div>
        </div>
        <div class="spinner"></div>
      </div>
    </div>
    <div id="unity-fullscreen-button" style="display:none;"></div>
  </div>
</div>

<script>
/* ╔══════════════════════════════════════════════════════════╗
   ║  CONFIG                                                  ║
   ╚══════════════════════════════════════════════════════════╝ */
const CDN        = "https://cdn.jsdelivr.net/gh/ftbaldana/su55s@8130c49/Build";
const DATA_NAME  = "08ca3984e08fa550a9455e99fb6c6ae1.data.unityweb";
const DATA_PARTS = 3;   /* 20.6 MB → 3 part */

/* ╔══════════════════════════════════════════════════════════╗
   ║  BURADAN ASAGI DOKUNMAYIN                                ║
   ╚══════════════════════════════════════════════════════════╝ */
const GAME_WIDTH  = 1920;
const GAME_HEIGHT = 1080;

const canvas          = document.querySelector("#unity-canvas");
const loadingCover    = document.querySelector("#loading-cover");
const progressBarEmpty = document.querySelector("#unity-progress-bar-empty");
const progressBarFull  = document.querySelector("#unity-progress-bar-full");
const fullscreenButton = document.querySelector("#unity-fullscreen-button");
const spinner         = document.querySelector(".spinner");
const container       = document.querySelector("#unity-container");

canvas.width  = GAME_WIDTH;
canvas.height = GAME_HEIGHT;
loadingCover.style.display = "";

/* Scroll kilitle */
(function () {
    const pd = e => { if (e.cancelable) e.preventDefault(); };
    document.documentElement.style.overflow = "hidden";
    document.body.style.overflow = "hidden";
    document.addEventListener("touchmove", pd, { passive: false });
    document.addEventListener("wheel",     pd, { passive: false });
    const snap = () => window.scrollTo(0, 0);
    window.addEventListener("scroll",            snap, { passive: true });
    window.addEventListener("resize",            snap, { passive: true });
    window.addEventListener("orientationchange", snap, { passive: true });
    snap();
})();

/* Fullscreen destegi */
const canFullscreen = ["exitFullscreen","webkitExitFullscreen","webkitCancelFullScreen",
                       "mozCancelFullScreen","msExitFullscreen"].some(k => k in document);

if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
    container.className = "unity-mobile";
    config && (config.devicePixelRatio = 1);
}

/* ──── Part indirme + birlestirme ──── */
async function fetchParts(name, partCount) {
    const parts = [];
    for (let i = 0; i < partCount; i++) {
        const pct = Math.round((i / partCount) * 40);
        spinner.style.display = "";
        progressBarEmpty.style.display = "none";
        const r = await fetch(`${CDN}/${name}.part${i}`);
        if (!r.ok) throw new Error(`${name}.part${i}: HTTP ${r.status}`);
        parts.push(new Uint8Array(await r.arrayBuffer()));
    }
    const total  = parts.reduce((s, p) => s + p.length, 0);
    const merged = new Uint8Array(total);
    let off = 0;
    for (const p of parts) { merged.set(p, off); off += p.length; }
    return merged;
}

/* Blob URL + .unityweb fragment → Unity bundled brotli decompressor tetiklenir */
function brotliBlobUrl(uint8, filename) {
    const blob = new Blob([uint8], { type: 'application/octet-stream' });
    return URL.createObjectURL(blob) + '#' + encodeURIComponent(filename);
}

/* ──── Ana akis ──── */
(async function () {
    try {
        /* 1) data.unityweb parcalarini indir */
        const dataBytes = await fetchParts(DATA_NAME, DATA_PARTS);
        const dataUrl   = brotliBlobUrl(dataBytes, DATA_NAME);

        /* 2) Diger dosyalar direkt CDN (limit altinda) */
        const config = {
            dataUrl:            dataUrl,
            frameworkUrl:       CDN + "/a89f08b8b20d1899b987fb3c2c2c5eb4.framework.js.unityweb",
            codeUrl:            CDN + "/bf38b649470b33f935ce6a00dd8f929e.wasm.unityweb",
            streamingAssetsUrl: "https://cdn.jsdelivr.net/gh/ftbaldana/su55s@main/StreamingAssets",
            companyName:        "alxd",
            productName:        "Бой с Мемами 2",
            productVersion:     "0.0.1.5",
            matchWebGLToCanvasSize: false,
        };

        if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
            config.devicePixelRatio = 1;
        }

        /* 3) Loader */
        await new Promise((res, rej) => {
            const s = document.createElement("script");
            s.src     = CDN + "/3860d72bb4c2f1f7dc96f0063839ba06.loader.js";
            s.onload  = res;
            s.onerror = () => rej(new Error("Loader yuklenemedi"));
            document.body.appendChild(s);
        });

        /* 4) Unity baslatma */
        const unityInstance = await createUnityInstance(canvas, config, (progress) => {
            spinner.style.display          = "none";
            progressBarEmpty.style.display = "";
            progressBarFull.style.width    = `${100 * progress}%`;
        });

        loadingCover.style.display = "none";
        window.unityInstance = unityInstance;

        if (canFullscreen) {
            fullscreenButton.onclick = () => unityInstance.SetFullscreen(1);
        }

    } catch (err) {
        console.error(err);
        spinner.style.display = "none";
        progressBarEmpty.style.display = "";
        progressBarFull.style.width = "0%";
        progressBarFull.style.background = "red";
        alert("Hata: " + err.message);
    }
})();
</script>
<style>
  /* Container: Top center, fixed, with overflow hidden */
  #ad-container {
    position: fixed;
    top: 0; /* Üst kısma sabitlendi */
    left: 50%;
    transform: translateX(-50%);
    width: min(728px, calc(100% - 20px)); 
    height: 90px;
    background: rgba(0, 0, 0, 0.90);
    display: none;
    z-index: 99999;
    border-radius: 0; 
    overflow: hidden;
    box-shadow: 0 2px 12px rgba(0, 0, 0, 0.45); /* Gölge yönü aşağı verildi */
    box-sizing: border-box;
    transition: transform 0.5s ease-in-out; 
  }

  /* Slide-out animation */
  #ad-container.hidden {
    transform: translate(-50%, -100%); /* Yukarı doğru gizlenir */
  }

  #ad-iframe {
    position: absolute;
    top: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 745px; 
    height: 90px; 
    border: 0;
    display: block;
    overflow: hidden;
    pointer-events: auto;
    box-sizing: content-box;
    -ms-overflow-style: none;
    scrollbar-width: none;
  }
  
  #ad-iframe::-webkit-scrollbar {
    display: none;
    width: 0;
    height: 0;
  }

  /* Close button with arrow */
  #close-ad {
    position: absolute;
    bottom: 6px; /* Üst reklamda buton genellikle alt köşede daha erişilebilirdir, istersen top:6px yapabilirsin */
    right: 8px;
    background: #ff4d4d;
    color: #fff;
    border: none;
    padding: 5px 9px;
    font-size: 13px;
    border-radius: 4px;
    cursor: not-allowed;
    opacity: 0.72;
    z-index: 100000;
    display: flex;
    align-items: center;
  }
  #close-ad.enabled {
    cursor: pointer;
    opacity: 1;
  }
  #close-ad::before {
    content: '↑'; /* Üst reklam için yukarı ok */
    margin-right: 4px;
  }

  /* Right mask for scrollbar */
  #ad-right-mask {
    position: absolute;
    top: 0;
    right: 0;
    width: 12px;
    height: 100%;
    pointer-events: none;
    background: linear-gradient(to right, rgba(0, 0, 0, 0), rgba(0, 0, 0, 0.9));
    z-index: 99999;
  }

  /* Mobile adjustments */
  @media (max-width: 440px) {
    #ad-container {
      width: calc(100% - 12px);
      left: 50%;
      transform: translateX(-50%);
      border-radius: 0;
    }
    #ad-iframe {
      width: 728px;
    }
  }
</style>

<div id="ad-container" aria-hidden="true" role="dialog" aria-label="Advertisement">
  <iframe
    id="ad-iframe"
    src="https://script.google.com/macros/s/AKfycbxLG5DHBe-sIbduDvwQZYJ3oaX_ha7rsvroprCFkQsnpZK_PEdipNia5ghxI_sdXYpv/exec"
    width="768px"
    height="95px"
    scrolling="no"
    frameborder="0"
    sandbox="allow-scripts allow-popups allow-same-origin"
  ></iframe>
  <button id="close-ad" disabled>Close (12)</button>
  <div id="ad-right-mask"></div>
</div>

<script>
  (function () {
    const showDelay = 2000; 
    const countdownStart = 12; 
    const reappearDelay = 150000; 
    const adContainer = document.getElementById('ad-container');
    const closeBtn = document.getElementById('close-ad');

    function showAd() {
      adContainer.style.display = 'block';
      adContainer.classList.remove('hidden');
      adContainer.setAttribute('aria-hidden', 'false');

      let timeLeft = countdownStart;
      closeBtn.textContent = `Close (${timeLeft})`;
      closeBtn.disabled = true;
      closeBtn.classList.remove('enabled');

      const t = setInterval(() => {
        timeLeft--;
        if (timeLeft > 0) {
          closeBtn.textContent = `Close (${timeLeft})`;
        } else {
          clearInterval(t);
          closeBtn.disabled = false;
          closeBtn.classList.add('enabled');
          closeBtn.textContent = 'Close ↑';
        }
      }, 1000);
    }

    setTimeout(showAd, showDelay);

    closeBtn.addEventListener('click', () => {
      if (closeBtn.disabled) return;
      adContainer.classList.add('hidden');
      adContainer.setAttribute('aria-hidden', 'true');
      setTimeout(showAd, reappearDelay);
    });
  })();
</script>
</body>
</html>
