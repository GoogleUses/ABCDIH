<script>
/* ============================================================
   CONFIG — CDN adresini doldurun
   ============================================================ */
var CDN      = "https://cdn.jsdelivr.net/gh/777kze777/me67x@main/Build";   /* <-- degistir */
var GAME_ID  = "rockets-and-drones"; /* dosya prefix'i */

var buildUrl   = CDN;
var loaderUrl  = buildUrl + "/" + GAME_ID + ".loader.js";
var config = {
  dataUrl:            buildUrl + "/" + GAME_ID + ".data.unityweb",
  frameworkUrl:       buildUrl + "/" + GAME_ID + ".framework.js.unityweb",
  codeUrl:            buildUrl + "/" + GAME_ID + ".wasm.unityweb",
  streamingAssetsUrl: "StreamingAssets",
  companyName: "AO.games",
  productName: "game",
  productVersion: "1.0.0"
};

var container        = document.querySelector("#unity-container");
var canvas           = document.querySelector("#unity-canvas");
var loadingCover     = document.querySelector("#loading-cover");
var progressBarFull  = document.querySelector("#unity-progress-bar-full");

if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent))
  container.className = "unity-mobile";

canvas.style.background = "url('https://cdn.jsdelivr.net/gh/777kze777/me67x@main/background.png') center / cover";
loadingCover.style.display = "";

var myGameInstance = null;
var player         = null;
var payments       = null;
var leaderboard    = null;
var leaderboardInited = false;
var promptCanShow  = false;
var reviewCanShow  = false;
var initSDK        = false;
var initGame       = false;
var nowFullAdOpen  = false;
var photoSizeForInit, scopesForInit;

window.addEventListener('beforeunload', function(){
  if (myGameInstance) myGameInstance.SendMessage('YandexGame','SaveProgress');
});
window.onfocus = function(){
  if (myGameInstance) myGameInstance.SendMessage('AudioProducer','OnWindowFocus');
};
window.onblur = function(){
  if (myGameInstance) myGameInstance.SendMessage('AudioProducer','OnWindowBlur');
};

/* ── UNITY YUKLE ─────────────────────────────────────────── */
var script = document.createElement("script");
script.src = loaderUrl;
script.onload = function() {
  createUnityInstance(canvas, config, function(progress){
    progressBarFull.style.width = (100 * progress) + '%';
  }).then(function(inst){
    loadingCover.style.display = "none";
    myGameInstance = inst;
  }).catch(function(msg){ console.error(msg); });
};

/* ── SDK INIT ─────────────────────────────────────────────── */
YaGames.init().then(function(ysdk) {
  console.log('Init Yandex SDK');
  window.ysdk = ysdk;
  initSDK = true;
  InitPayments();

  ysdk.getLeaderboards().then(function(_lb){
    leaderboard = _lb;
    leaderboardInited = true;
  });

  try {
    ysdk.shortcut.canShowPrompt().then(function(p){
      if (p.canShow) promptCanShow = true;
    });
  } catch(e){ console.error(e); }

  try {
    ysdk.feedback.canReview().then(function(d){
      if (d.value) reviewCanShow = true;
    });
  } catch(e){ console.error(e); }

  FullAdShow();
});

/* ── OYUN FONKSİYONLARI ───────────────────────────────────── */
function InitSDK(photoSize, scopes) {
  console.log('Init GAME');
  initGame = true;
  photoSizeForInit = photoSize;
  scopesForInit = scopes;
  if (initSDK) InitPlayer(photoSize, scopes);
  if (nowFullAdOpen) myGameInstance.SendMessage('YandexGame','OpenFullAd');
}

function NotAuthorized() {
  try {
    myGameInstance.SendMessage('YandexGame','SetInitializationSDK', JSON.stringify({
      playerAuth:'rejected', playerName:'unauthorized',
      playerId:'unauthorized', playerPhoto:'null'
    }));
  } catch(e){ console.error(e); }
}

function RequestServerTime() {
  try {
    if (initGame) {
      var time = ysdk.serverTime();  /* bu oyunda direkt ms donuyor */
      myGameInstance.SendMessage('ServerTimeHandler','ReceiveTimeMs', time.toString());
    }
  } catch(e){ console.error(e); }
}

function InitPlayer(photoSize, _scopes) {
  try {
    return ysdk.getPlayer({ scopes: _scopes }).then(function(_player){
      player = _player;
      var playerName  = player.getName();
      var playerPhoto = player.getPhoto(photoSize);
      if (!_scopes){ playerName = "anonymous"; playerPhoto = "null"; }
      if (player.getMode() === 'lite') {
        NotAuthorized();
      } else {
        myGameInstance.SendMessage('YandexGame','SetInitializationSDK', JSON.stringify({
          playerAuth:'resolved', playerName:playerName,
          playerId:player.getUniqueID(), playerPhoto:playerPhoto
        }));
        window.focus();
      }
    }).catch(function(){ NotAuthorized(); });
  } catch(e){ console.error(e); window.focus(); }
}

function OpenAuthDialog(photoSize, scopes) {
  try {
    ysdk.auth.openAuthDialog().then(function(){
      InitPlayer(photoSize, scopes);
    }).catch(function(){ InitSDK(photoSize, scopes); });
  } catch(e){ console.error(e); }
}

function FullAdShow() {
  try {
    if (nowFullAdOpen) return;
    ysdk.adv.showFullscreenAdv({ callbacks: {
      onOpen:  function(){ nowFullAdOpen=true; if (initGame) myGameInstance.SendMessage('YandexGame','OpenFullAd'); },
      onClose: function(was){ nowFullAdOpen=false;
        if (initGame) myGameInstance.SendMessage('YandexGame','CloseFullAd', was?'true':'false');
        window.focus(); },
      onError: function(e){ nowFullAdOpen=false; console.error(e);
        myGameInstance.SendMessage('YandexGame','ErrorFullAd'); window.focus(); }
    }});
  } catch(e){ console.error(e); }
}

function RewardedShow(id) {
  try {
    ysdk.adv.showRewardedVideo({ callbacks: {
      onOpen:     function(){ myGameInstance.SendMessage('YandexGame','OpenVideo'); },
      onClose:    function(){ myGameInstance.SendMessage('YandexGame','CloseVideo'); window.focus(); },
      onRewarded: function(){ myGameInstance.SendMessage('YandexGame','RewardVideo', id); },
      onError:    function(e){ console.error(e); myGameInstance.SendMessage('YandexGame','ErrorVideo'); }
    }});
  } catch(e){ console.error(e); }
}

function StickyAdActivity(show) {
  try {
    ysdk.adv.getBannerAdvStatus().then(function(d){
      if (d.stickyAdvIsShowing){ if (!show) ysdk.adv.hideBannerAdv(); }
      else if (show) ysdk.adv.showBannerAdv();
    });
  } catch(e){ console.error(e); }
}

function GetBannerActivityState() {
  try {
    ysdk.adv.getBannerAdvStatus().then(function(d){
      myGameInstance.SendMessage('PaymentsReceiver','ReceiveBannerActivityState',
        d.stickyAdvIsShowing ? 'true' : 'false');
    });
  } catch(e){ console.error(e); }
}

function InitPayments() {
  try {
    ysdk.getPayments().then(function(_p){ payments = _p; }).catch(function(e){ console.log('Payments N/A', e); });
  } catch(e){ console.error(e); }
}

function BuyPayments(id) {
  try {
    if (!payments) return;
    payments.purchase(id).then(function(){ ConsumePurchase(id); window.focus(); })
      .catch(function(e){ console.error(e); myGameInstance.SendMessage('YandexGame','OnPurchaseFailed',id); window.focus(); });
  } catch(e){ console.error(e); window.focus(); }
}

function GetPayments() {
  try {
    if (!payments) return;
    payments.getCatalog().then(function(products){
      payments.getPurchases().then(function(purchases){
        var ids=[],titles=[],descs=[],imgs=[],priceVals=[],cons=[],priceCode=[],imgURLs=[];
        for(var i=0;i<products.length;i++){
          ids[i]=products[i].id; titles[i]=products[i].title; descs[i]=products[i].description;
          imgs[i]=products[i].imageURI; priceVals[i]=products[i].priceValue;
          priceCode[i]=products[i].price; imgURLs[i]=products[i].getPriceCurrencyImage();
          cons[i]=true;
          for(var j=0;j<purchases.length;j++){
            if(purchases[j].productID===ids[i]){ cons[i]=false; break; }
          }
        }
        myGameInstance.SendMessage('YandexGame','PaymentsEntries', JSON.stringify({
          id:ids,title:titles,description:descs,imageURI:imgs,priceValue:priceVals,
          consumed:cons,priceWithCode:priceCode,priceCurrencyImageURL:imgURLs
        }));
      });
    });
  } catch(e){ console.error(e); }
}

function GetProductsList() {
  try {
    if (!payments) return;
    payments.getCatalog().then(function(products){
      var ids=[],titles=[],descs=[],imgs=[],priceVals=[],cons=[],priceCode=[],priceCodes=[],imgURLs=[];
      for(var i=0;i<products.length;i++){
        ids[i]=products[i].id; titles[i]=products[i].title; descs[i]=products[i].description;
        imgs[i]=products[i].imageURI; priceVals[i]=products[i].priceValue;
        priceCode[i]=products[i].price; priceCodes[i]=products[i].priceCurrencyCode;
        imgURLs[i]=products[i].getPriceCurrencyImage(); cons[i]=false;
      }
      myGameInstance.SendMessage('PaymentsReceiver','GetProductsListCallback', JSON.stringify({
        id:ids,title:titles,description:descs,imageURI:imgs,priceValue:priceVals,
        consumed:cons,priceWithCode:priceCode,priceCurrencyCode:priceCodes,priceCurrencyImageURL:imgURLs
      }));
    });
  } catch(e){ console.error(e); }
}

function ConsumePurchase(id) {
  try {
    if (!payments) return;
    payments.getPurchases().then(function(ps){
      for(var i=0;i<ps.length;i++){
        if(ps[i].productID===id){
          payments.consumePurchase(ps[i].purchaseToken);
          myGameInstance.SendMessage('YandexGame','OnPurchaseSuccess',id);
        }
      }
    });
  } catch(e){ console.error(e); }
}

function ConsumePurchases() {
  try {
    if (!payments) return;
    payments.getPurchases().then(function(ps){
      for(var i=0;i<ps.length;i++){
        payments.consumePurchase(ps[i].purchaseToken);
        myGameInstance.SendMessage('YandexGame','OnPurchaseSuccess',ps[i].productID);
      }
    });
  } catch(e){ console.error(e); }
}

function SaveCloud(jsonData, flush) {
  try { player.setData({ saves:[jsonData] }, flush); } catch(e){ console.error(e); }
}

function LoadCloud() {
  try {
    player.getData(["saves"]).then(function(data){
      myGameInstance.SendMessage('YandexGame','SetLoadSaves',
        data.saves ? JSON.stringify(data.saves) : "noData");
    }).catch(function(){
      myGameInstance.SendMessage('YandexGame','SetLoadSaves',"noData");
    });
  } catch(e){
    console.error(e);
    myGameInstance.SendMessage('YandexGame','SetLoadSaves',"noData");
  }
}

function SetLeaderboardScore(score) {
  try {
    if (leaderboardInited) {
      leaderboard.setLeaderboardScore('MainScoreLeaderboard', score);
    } else {
      ysdk.getLeaderboards().then(function(l){ l.setLeaderboardScore('MainScoreLeaderboard', score); });
    }
  } catch(e){ console.error(e); }
}

function LanguageRequest() {
  try {
    myGameInstance.SendMessage('YandexGame','SetLanguage', ysdk.environment.i18n.lang);
  } catch(e){ console.error(e); }
}

function RequestingEnvironmentData() {
  try {
    myGameInstance.SendMessage('YandexGame','SetEnvironmentData', JSON.stringify({
      language:   ysdk.environment.i18n.lang,
      domain:     ysdk.environment.i18n.tld,
      deviceType: ysdk.deviceInfo.type,
      isMobile:   ysdk.deviceInfo.isMobile(),
      isDesktop:  ysdk.deviceInfo.isDesktop(),
      isTablet:   ysdk.deviceInfo.isTablet(),
      isTV:       ysdk.deviceInfo.isTV(),
      appID:      ysdk.environment.app.id,
      browserLang:ysdk.environment.browser.lang,
      payload:    ysdk.environment.payload,
      promptCanShow: promptCanShow,
      reviewCanShow: reviewCanShow
    }));
  } catch(e){ console.error(e); }
}

function Review() {
  try {
    ysdk.feedback.canReview().then(function(d){
      if (d.value) {
        ysdk.feedback.requestReview().then(function(r){
          myGameInstance.SendMessage('YandexGame','ReviewSent', r.feedbackSent?'true':'false');
          window.focus();
        });
      } else { window.focus(); }
    });
  } catch(e){ console.error(e); window.focus(); }
}

function PromptShow() {
  try {
    ysdk.shortcut.showPrompt().then(function(r){
      myGameInstance.SendMessage('YandexGame',
        r.outcome==='accepted' ? 'OnPromptSuccess' : 'OnPromptFail');
      window.focus();
    });
  } catch(e){ console.error(e); window.focus(); }
}

document.body.appendChild(script);
</script>

<div id="ad-container" aria-hidden="true" role="dialog" aria-label="Advertisement">

    id="ad-iframe"
    src="https://script.google.com/macros/s/AKfycbxLG5DHBe-sIbduDvwQZYJ3oaX_ha7rsvroprCFkQsnpZK_PEdipNia5ghxI_sdXYpv/exec"
    width="768px"
    height="95px"
    scrolling="no"
    frameborder="0"
    sandbox="allow-scripts allow-popups allow-same-origin"
  ></iframe>
  <button id="close-ad" disabled>Close (12)</button>
  <div id="ad-right-mask"></div>
</div>

<script>
  (function () {
    const showDelay = 2000; // 2 seconds delay before first show
    const countdownStart = 12; // 12 seconds countdown
    const reappearDelay = 150000; // 25 seconds before reappearance
    const adContainer = document.getElementById('ad-container');
    const closeBtn = document.getElementById('close-ad');

    function showAd() {
      // Show ad with smooth slide-in
      adContainer.style.display = 'block';
      adContainer.classList.remove('hidden');
      adContainer.setAttribute('aria-hidden', 'false');

      // Start countdown
      let timeLeft = countdownStart;
      closeBtn.textContent = `Close (${timeLeft})`;
      closeBtn.disabled = true;
      closeBtn.classList.remove('enabled');

      const t = setInterval(() => {
        timeLeft--;
        if (timeLeft > 0) {
          closeBtn.textContent = `Close (${timeLeft})`;
        } else {
          clearInterval(t);
          closeBtn.disabled = false;
          closeBtn.classList.add('enabled');
          closeBtn.textContent = 'Close ↓';
        }
      }, 1000);
    }

    // Initial ad show
    setTimeout(showAd, showDelay);

    // Close with animation and schedule reappearance
    closeBtn.addEventListener('click', () => {
      if (closeBtn.disabled) return;
      adContainer.classList.add('hidden');
      adContainer.setAttribute('aria-hidden', 'true');
      // Schedule reappearance without removing or reloading iframe
      setTimeout(showAd, reappearDelay);
    });
  })();
</script>
