


<!DOCTYPE html>
<html lang="en-us">
<head>
    <meta charset="utf-8"/>
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
    <style>
        html, body {
            overflow: hidden;
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background: #000;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
            cursor: default;
        }
        #unity-container { width: 100%; height: 100%; position: absolute; }
        #unity-canvas { width: 100%; height: 100%; background: #231f20; }
        #loading-cover { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #231f20; display: flex; justify-content: center; align-items: center; z-index: 999; }
        #unity-loading-bar { width: 200px; }
        #unity-progress-bar-empty { width: 100%; height: 10px; background: rgba(255,255,255,0.2); margin-top: 10px; border-radius: 5px; }
        #unity-progress-bar-full { width: 0%; height: 100%; background: #fff; border-radius: 5px; transition: width 0.3s; }
    </style>
</head>
<body class="dark">
    <div id="unity-container" class="unity-desktop">
        <canvas id="unity-canvas"></canvas>
    </div>
    <div id="loading-cover">
        <div id="unity-loading-bar">
            <div id="unity-progress-bar-empty">
                <div id="unity-progress-bar-full"></div>
            </div>
        </div>
    </div>

    <script>
        const buildUrl = "https://cdn.jsdelivr.net/gh/testamalame/ta7x7x7@main/Build";
        const loaderUrl = buildUrl + "/Build.loader.js";
        const config = {
            dataUrl: buildUrl + "/Build.data.unityweb",
            frameworkUrl: buildUrl + "/Build.framework.js.unityweb",
            codeUrl: buildUrl + "/Build.wasm.unityweb",
            streamingAssetsUrl: "StreamingAssets",
            companyName: "AO.games",
            productName: "plane-flight",
            productVersion: "1.1.0",
        };

        const container = document.querySelector("#unity-container");
        const canvas = document.querySelector("#unity-canvas");
        const loadingCover = document.querySelector("#loading-cover");
        const progressBarFull = document.querySelector("#unity-progress-bar-full");

        let myGameInstance = null;

        // --- ZORLA ODAK VE KONTROL ---
        function forceFocus() {
            window.focus();
            if (canvas) canvas.focus();
        }

        window.addEventListener('touchstart', forceFocus);
        window.addEventListener('mousedown', forceFocus);
        
        // Recursive PlayerLoop hatasını engellemek için SendMessage'ı bir sonraki tick'e atıyoruz
        window.onfocus = () => {
            if (myGameInstance) {
                setTimeout(() => {
                    myGameInstance.SendMessage('AudioProducer', 'OnWindowFocus');
                }, 0);
            }
        };
        window.onblur = () => {
            forceFocus();
        };

        // --- YANDEX SDK MOCK & FIX ---
        window.ysdk = {
            environment: {
                i18n: { lang: 'en', tld: 'com' },
                app: { id: '12345' },
                browser: { lang: 'en' },
                payload: null
            },
            deviceInfo: {
                type: 'desktop',
                isMobile: () => false,
                isDesktop: () => true,
                isTablet: () => false,
                isTV: () => false
            },
            features: {
                LoadingAPI: {
                    ready: function() { console.log("SDK Shim: LoadingAPI.ready()"); }
                },
                GameplayAPI: {
                    start: function() { console.log("SDK Shim: GameplayAPI.start()"); },
                    stop: function() { console.log("SDK Shim: GameplayAPI.stop()"); }
                }
            },
            adv: {
                showFullscreenAdv: (opts) => { 
                    if (opts && opts.callbacks) {
                        opts.callbacks.onOpen();
                        setTimeout(() => { opts.callbacks.onClose(true); forceFocus(); }, 100);
                    }
                },
                showRewardedVideo: (opts) => {
                    if (opts && opts.callbacks) {
                        opts.callbacks.onOpen();
                        setTimeout(() => { opts.callbacks.onRewarded(); opts.callbacks.onClose(); forceFocus(); }, 100);
                    }
                },
                getBannerAdvStatus: () => Promise.resolve({ stickyAdvIsShowing: false }),
                showBannerAdv: () => {},
                hideBannerAdv: () => {}
            },
            getLeaderboards: () => Promise.resolve({ setLeaderboardScore: () => {} }),
            getPayments: () => Promise.reject("Disabled"),
            getPlayer: () => Promise.resolve({
                getName: () => "Player",
                getPhoto: () => "null",
                getUniqueID: () => "123",
                getMode: () => "lite",
                setData: () => Promise.resolve(),
                getData: () => Promise.resolve({})
            }),
            feedback: { canReview: () => Promise.resolve({ value: false }), requestReview: () => Promise.resolve() },
            shortcut: { canShowPrompt: () => Promise.resolve({ canShow: false }), showPrompt: () => Promise.resolve() }
        };

        window.YaGames = {
            init: function() { return Promise.resolve(window.ysdk); }
        };

        // Global referanslar
        window.LoadingAPI = window.ysdk.features.LoadingAPI;
        window.GameplayAPI = window.ysdk.features.GameplayAPI;
        
        window._YandexGame_GameReady = function() { console.log("SDK Shim: Game Ready Received."); };
        window._YandexGame_GameplayStart = function() { window.ysdk.features.GameplayAPI.start(); };
        window._YandexGame_GameplayStop = function() { window.ysdk.features.GameplayAPI.stop(); };

        // Oyunun beklediği global fonksiyonlar
        function FullAdShow() { console.log("Ad Blocked - Auto Close"); forceFocus(); }
        function GetPayments() { console.error("Payments not supported"); }
        function RewardedShow(id) { 
            if(myGameInstance) {
                myGameInstance.SendMessage('YandexGame', 'OpenVideo');
                setTimeout(() => {
                    myGameInstance.SendMessage('YandexGame', 'RewardVideo', id);
                    myGameInstance.SendMessage('YandexGame', 'CloseVideo');
                    forceFocus();
                }, 100);
            }
        }
        function InitSDK() { 
            let authJson = { "playerAuth": "resolved", "playerName": "Player", "playerId": "123", "playerPhoto": "null" };
            if(myGameInstance) myGameInstance.SendMessage('YandexGame', 'SetInitializationSDK', JSON.stringify(authJson));
            forceFocus();
        }
        function LanguageRequest() { if(myGameInstance) myGameInstance.SendMessage('YandexGame', 'SetLanguage', 'en'); }
        function RequestingEnvironmentData() {
            let jsonEnvir = { "language": "en", "isDesktop": true, "promptCanShow": false, "reviewCanShow": false };
            if(myGameInstance) myGameInstance.SendMessage('YandexGame', 'SetEnvironmentData', JSON.stringify(jsonEnvir));
        }
        function SaveCloud() {}
        function LoadCloud() { if(myGameInstance) myGameInstance.SendMessage('YandexGame', 'SetLoadSaves', "noData"); }
        function InitPayments() {}
        function StickyAdActivity() {}
                function SetLeaderboardScore() {}
        function Review() { forceFocus(); }

        // --- UNITY YÜKLEME ---
        const script = document.createElement("script");
        script.src = loaderUrl;
        script.onload = () => {
            createUnityInstance(canvas, config, (progress) => {
                progressBarFull.style.width = `${100 * progress}%`;
            }).then((unityInstance) => {
                myGameInstance = unityInstance;
                loadingCover.style.display = "none";
                forceFocus();
            }).catch((message) => {
                console.error("Unity Load Error:", message);
            });
        };
        document.body.appendChild(script);
    </script>
    
    </body>
</html>
