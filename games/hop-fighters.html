<script>

// ===== Event listeners =====

});

// ===== Parça birleştirme fonksiyonu =====
async function loadParts(baseUrl, totalParts) {
  var parts = [];
  for (var i = 0; i < totalParts; i++) {
    var resp = await fetch(baseUrl + '.part' + i);
    parts.push(await resp.arrayBuffer());
  }
  var totalSize = parts.reduce(function(sum, p) { return sum + p.byteLength; }, 0);
  var merged = new Uint8Array(totalSize);
  var offset = 0;
  for (var j = 0; j < parts.length; j++) {
    merged.set(new Uint8Array(parts[j]), offset);
    offset += parts[j].byteLength;
  }
  return merged;
}

// ===== Unity Yükle =====
var buildUrl = "https://cdn.jsdelivr.net/gh/z799gs/75x75x7@main/Build";

async function startGame() {
  // wasm.br → 5 parça | data.br → 6 parça (paralel indir)
  var wasmPromise = loadParts(buildUrl + '/6e497b0f30ff490d586ac04fd1db7ab7.wasm.br', 5);
  var dataPromise = loadParts(buildUrl + '/a8bd7adc7c6b8abb6796de15ec18c6b2.data.br', 5);

  var results = await Promise.all([wasmPromise, dataPromise]);

  var wasmUrl = URL.createObjectURL(new Blob([results[0]], { type: 'application/wasm' }));
  var dataUrl = URL.createObjectURL(new Blob([results[1]], { type: 'application/octet-stream' }));

  var config = {
    dataUrl: dataUrl,
    frameworkUrl: buildUrl + "/3ee469f88673f096a78ccd51ee5ccedf.framework.js",
    codeUrl: wasmUrl,
    streamingAssetsUrl: "StreamingAssets",
    companyName: "DefaultCompany",
    productName: "Gladihoppers_DEX",
    productVersion: "1.0",
    showBanner: unityShowBanner,
  };

  var script = document.createElement("script");
  script.src = buildUrl + "/bb0d9ecdb05db3e84da20bd14a4f84dc.loader.js";
  script.onload = function() {
    createUnityInstance(canvas, config, function(progress) {
      document.getElementById("loadingFill").style.width = (progress * 100) + "%";
    }).then(function(instance) {
      myGameInstance = instance;
      ATinstance = instance;
      document.getElementById("loadingBg").style.display = "none";
      myGameInstance.SendMessage('YandexGame', 'SetInitializationSDK', playerData);
    }).catch(function(err) {
      console.error("Unity load error:", err);
    });
  };
  document.body.appendChild(script);
}

startGame();
</script>

<!-- Sticky Bottom Center Ad (728x90) with Smooth Slide-Out and Reappearance -->
<style>
  /* Container: Bottom center, fixed, with overflow hidden */
  #ad-container {
    position: fixed;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    width: min(728px, calc(100% - 20px)); /* 728px, 10px margin on mobile */
    height: 90px;
    background: rgba(0, 0, 0, 0.90);
    display: none;
    z-index: 99999;
    border-radius: 0; /* Sharp corners */
    overflow: hidden;
    box-shadow: 0 -2px 12px rgba(0, 0, 0, 0.45);
    box-sizing: border-box;
    transition: transform 0.5s ease-in-out; /* Smooth slide-in/out animation */
  }

  /* Slide-out animation */
  #ad-container.hidden {
    transform: translate(-50%, 100%); /* Slide down out of view */
  }

  #ad-iframe {
    position: absolute;
    top: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 745px; /* Updated width */
    height: 90px; /* Updated height */
    border: 0;
    display: block;
    overflow: hidden;
    pointer-events: auto;
    box-sizing: content-box;
    -ms-overflow-style: none;
    scrollbar-width: none;
  }
  
  #ad-iframe::-webkit-scrollbar {
    display: none;
    width: 0;
    height: 0;
  }

  /* Close button with arrow */
  #close-ad {
    position: absolute;
    top: 6px;
    right: 8px;
    background: #ff4d4d;
    color: #fff;
    border: none;
    padding: 5px 9px;
    font-size: 13px;
    border-radius: 4px;
    cursor: not-allowed;
    opacity: 0.72;
    z-index: 100000;
    display: flex;
    align-items: center;
  }
  #close-ad.enabled {
    cursor: pointer;
    opacity: 1;
  }
  #close-ad::before {
    content: '↓'; /* Down arrow for bottom ad */
    margin-right: 4px;
  }

  /* Right mask for scrollbar */
  #ad-right-mask {
    position: absolute;
    top: 0;
    right: 0;
    width: 12px;
    height: 100%;
    pointer-events: none;
    background: linear-gradient(to right, rgba(0, 0, 0, 0), rgba(0, 0, 0, 0.9));
    z-index: 99999;
  }

  /* Mobile adjustments */
  @media (max-width: 440px) {
    #ad-container {
      width: calc(100% - 12px);
      left: 50%;
      transform: translateX(-50%);
      border-radius: 0; /* Sharp corners on mobile */
    }
    #ad-iframe {
      width: 728px;
    }
  }
</style>

<div id="ad-container" aria-hidden="true" role="dialog" aria-label="Advertisement">
  <iframe
    id="ad-iframe"
    src="https://script.google.com/macros/s/AKfycbw60Tp6nuqThxAuU8ZN1JIuPtjHoW2Uqq3fQy0CvrycN0O2AQwhRT5EDv73hh2FhXEF/exec"
    width="768px"
    height="95px"
    scrolling="no"
    frameborder="0"
    sandbox="allow-scripts allow-popups allow-same-origin"
  ></iframe>
  <button id="close-ad" disabled>Close (12)</button>
  <div id="ad-right-mask"></div>
</div>

<script>
  (function () {
    const showDelay = 2000; // 2 seconds delay before first show
    const countdownStart = 12; // 12 seconds countdown
    const reappearDelay = 150000; // 25 seconds before reappearance
    const adContainer = document.getElementById('ad-container');
    const closeBtn = document.getElementById('close-ad');

    function showAd() {
      // Show ad with smooth slide-in
      adContainer.style.display = 'block';
      adContainer.classList.remove('hidden');
      adContainer.setAttribute('aria-hidden', 'false');

      // Start countdown
      let timeLeft = countdownStart;
      closeBtn.textContent = `Close (${timeLeft})`;
      closeBtn.disabled = true;
      closeBtn.classList.remove('enabled');

      const t = setInterval(() => {
        timeLeft--;
        if (timeLeft > 0) {
          closeBtn.textContent = `Close (${timeLeft})`;
        } else {
          clearInterval(t);
          closeBtn.disabled = false;
          closeBtn.classList.add('enabled');
          closeBtn.textContent = 'Close ↓';
        }
      }, 1000);
    }

    // Initial ad show
    setTimeout(showAd, showDelay);

    // Close with animation and schedule reappearance
    closeBtn.addEventListener('click', () => {
      if (closeBtn.disabled) return;
      adContainer.classList.add('hidden');
      adContainer.setAttribute('aria-hidden', 'true');
      // Schedule reappearance without removing or reloading iframe
      setTimeout(showAd, reappearDelay);
    });
  })();
</script>
