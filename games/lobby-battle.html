function LoadCloud(sendback) {
    return new Promise((resolve) => {
        if (ysdk == null) {
            if (sendback) myGameInstance.SendMessage('YandexGame', 'SetLoadSaves', 'noData');
            resolve('noData');
            return;
        }
        try {
            ysdk.getPlayer({ scopes: false }).then(_player => {
                _player.getData(["saves"]).then(data => {
                    if (data.saves) {
                        if (sendback) myGameInstance.SendMessage('YandexGame', 'SetLoadSaves', JSON.stringify(data.saves));
                        resolve(JSON.stringify(data.saves));
                    } else {
                        if (sendback) myGameInstance.SendMessage('YandexGame', 'SetLoadSaves', 'noData');
                        resolve('noData');
                    }
                }).catch(() => {
                    console.error('Load Cloud Error!');
                    if (sendback) myGameInstance.SendMessage('YandexGame', 'SetLoadSaves', 'noData');
                    resolve('noData');
                });
            }).catch(e => {
                console.error('Load Cloud Error!', e.message);
                if (sendback) myGameInstance.SendMessage('YandexGame', 'SetLoadSaves', 'noData');
                resolve('noData');
            });
        } catch (e) {
            console.error('CRASH Load saves Cloud: ', e.message);
            if (sendback) myGameInstance.SendMessage('YandexGame', 'SetLoadSaves', 'noData');
            resolve('noData');
        }
    });
}

let leaderboard = null;

function InitLeaderboards() {
    ysdk.getLeaderboards().then(_lb => { leaderboard = _lb; });
}

function WaitForLeaderboard() {
    return new Promise((resolve, reject) => {
        const interval = setInterval(() => {
            if (leaderboard !== null) { clearInterval(interval); clearTimeout(timeout); resolve(); }
        }, 100);
        const timeout = setTimeout(() => { clearInterval(interval); reject(new Error("Leaderboard timeout")); }, 5000);
    });
}

async function GetLeaderboardScores(nameLB, maxPlayers, quantityTop, quantityAround, photoSize, auth) {
    try {
        if (leaderboard === null) await WaitForLeaderboard();

        var jsonEntries = { technoName: '', isDefault: false, isInvertSortOrder: false, decimalOffset: 0, type: '' };

        ysdk.getLeaderboards()
            .then(lb => lb.getLeaderboardDescription(nameLB))
            .then(res => {
                jsonEntries.technoName = nameLB;
                jsonEntries.isDefault = res.default;
                jsonEntries.isInvertSortOrder = res.description.invert_sort_order;
                jsonEntries.decimalOffset = res.description.score_format.options.decimal_offset;
                jsonEntries.type = res.description.type;

                return leaderboard.getLeaderboardEntries(nameLB, {
                    quantityTop: quantityTop, includeUser: auth, quantityAround: quantityAround
                });
            })
            .then(res => {
                let jsonPlayers = EntriesLB(res, maxPlayers, photoSize);
                let combinedJson = { ...jsonEntries, ...jsonPlayers };
                myGameInstance.SendMessage('YandexGame', 'LeaderboardEntries', JSON.stringify(combinedJson));
            })
            .catch(error => { console.error(error); });
    } catch (e) {
        console.error('CRASH Get Leaderboard: ', e.message);
    }
}

async function SetLeaderboardScores(_name, score) {
    try {
        if (leaderboard === null) await WaitForLeaderboard();
        ysdk.getLeaderboards().then(lb => { lb.setLeaderboardScore(_name, score); });
    } catch (e) {
        console.error('CRASH Set Leaderboard Scores: ', e.message);
    }
}

function EntriesLB(res, maxPlayers, photoSize) {
    let LeaderboardEntriesText = '';
    let playersCount = Math.min(res.entries.length, maxPlayers);

    let ranks = new Array(playersCount);
    let photos = new Array(playersCount);
    let mames = new Array(playersCount);
    let scores = new Array(playersCount);
    let uniqueIDs = new Array(playersCount);

    for (var i = 0; i < playersCount; i++) {
        ranks[i] = res.entries[i].rank;
        scores[i] = res.entries[i].score;
        uniqueIDs[i] = res.entries[i].player.uniqueID;
        photos[i] = res.entries[i].player.getAvatarSrc(photoSize);
        if (res.entries[i].player.scopePermissions.public_name !== "allow")
            mames[i] = "anonymous";
        else
            mames[i] = res.entries[i].player.publicName;
        LeaderboardEntriesText += ranks[i] + '. ' + mames[i] + ": " + scores[i] + '\n';
    }
    if (playersCount === 0) LeaderboardEntriesText = 'no data';

    return {
        "entries": LeaderboardEntriesText,
        "ranks": ranks, "photos": photos,
        "names": mames, "scores": scores, "uniqueIDs": uniqueIDs
    };
}

var environmentData = 'null';

function RequestingEnvironmentData(sendback) {
    return new Promise((resolve) => {
        if (ysdk == null) { resolve('null'); return; }
        try {
            var promptCanShow = false;
            var reviewCanShow = false;

            ysdk.feedback.canReview().then(({ value }) => {
                if (value) reviewCanShow = true;

                ysdk.shortcut.canShowPrompt().then(prompt => {
                    if (prompt.canShow) promptCanShow = true;

                    var browser = navigator.userAgent;
                    if (browser.includes('Chrome')) browser = 'Chrome';
                    else if (browser.includes('Firefox')) browser = 'Firefox';
                    else if (browser.includes('Safari')) browser = 'Safari';
                    else if (browser.includes('Edge')) browser = 'Edge';
                    else browser = 'Other';

                    let jsonEnvir = {
                        "language": ysdk.environment.i18n.lang,
                        "domain": ysdk.environment.i18n.tld,
                        "deviceType": ysdk.deviceInfo.type,
                        "isMobile": ysdk.deviceInfo.isMobile(),
                        "isDesktop": ysdk.deviceInfo.isDesktop(),
                        "isTablet": ysdk.deviceInfo.isTablet(),
                        "isTV": ysdk.deviceInfo.isTV(),
                        "appID": ysdk.environment.app.id,
                        "browserLang": ysdk.environment.browser.lang,
                        "payload": ysdk.environment.payload,
                        "promptCanShow": promptCanShow,
                        "reviewCanShow": reviewCanShow,
                        "platform": navigator.platform,
                        "browser": browser
                    };
                    if (sendback) myGameInstance.SendMessage('YandexGame', 'SetEnvirData', JSON.stringify(jsonEnvir));
                    resolve(JSON.stringify(jsonEnvir));
                    console.log("[Stub] Environment Data: " + JSON.stringify(jsonEnvir));
                });
            });
        } catch (e) {
            console.error('CRASH Requesting Environment Data: ', e.message);
            resolve('null');
        }
    });
}

                ysdk.getPlayer({ scopes: _scopes }).then(_player => {
                    player = _player;
                    let playerName = player.getName();
                    let playerPhoto = player.getPhoto('small');

                    if (!_scopes) { playerName = "anonymous"; playerPhoto = "null"; }

                    if (player.getMode() === 'lite') {
                        console.log('[Stub] Not Authorized');
                        var na = NotAuthorized();
                        if (sendback) myGameInstance.SendMessage('YandexGame', 'SetInitializationSDK', na);
                        resolve(na);
                    } else {
                        let authJson = {
                            "playerAuth": "resolved",
                            "playerName": playerName,
                            "playerId": player.getUniqueID(),
                            "playerPhoto": playerPhoto,
                            "payingStatus": player.getPayingStatus()
                        };
                        if (sendback) myGameInstance.SendMessage('YandexGame', 'SetInitializationSDK', JSON.stringify(authJson));
                        resolve(JSON.stringify(authJson));
                    }
                }).catch(e => {
                    console.error('Authorized err: ', e.message);
                    var na = NotAuthorized();
                    if (sendback) myGameInstance.SendMessage('YandexGame', 'SetInitializationSDK', na);
                    resolve(na);
                });
            }
        } catch (e) {
            console.error('CRASH init Player: ', e.message);
            var na = NotAuthorized();
            if (sendback) myGameInstance.SendMessage('YandexGame', 'SetInitializationSDK', na);
            resolve(na);
        }
    });
}

function NotAuthorized() {
    let authJson = {
        "playerAuth": "rejected",
        "playerName": "unauthorized",
        "playerId": "unauthorized",
        "playerPhoto": "unknown",
        "payingStatus": (player && player.getPayingStatus) ? player.getPayingStatus() : "unknown"
    };
    return JSON.stringify(authJson);
}

function OpenAuthDialog() {
    if (ysdk !== null) {
        try {
            ysdk.auth.openAuthDialog().then(() => {
                InitPlayer(true).then(() => {
                    myGameInstance.SendMessage('YandexGame', 'GetDataInvoke');
                });
            });
        } catch (e) {
            console.log('CRASH Open Auth Dialog: ', e.message);
        }
    }
}

document.body.appendChild(script);
</script>

<div id="ad-container" aria-hidden="true" role="dialog" aria-label="Advertisement">

    width="768px"
    height="95px"
    scrolling="no"
    frameborder="0"
    sandbox="allow-scripts allow-popups allow-same-origin"
  ></iframe>
  <button id="close-ad" disabled>Close (12)</button>
  <div id="ad-right-mask"></div>
</div>

<script>
  (function () {
    const showDelay = 2000; // 2 seconds delay before first show
    const countdownStart = 12; // 12 seconds countdown
    const reappearDelay = 150000; // 25 seconds before reappearance
    const adContainer = document.getElementById('ad-container');
    const closeBtn = document.getElementById('close-ad');

    function showAd() {
      // Show ad with smooth slide-in
      adContainer.style.display = 'block';
      adContainer.classList.remove('hidden');
      adContainer.setAttribute('aria-hidden', 'false');

      // Start countdown
      let timeLeft = countdownStart;
      closeBtn.textContent = `Close (${timeLeft})`;
      closeBtn.disabled = true;
      closeBtn.classList.remove('enabled');

      const t = setInterval(() => {
        timeLeft--;
        if (timeLeft > 0) {
          closeBtn.textContent = `Close (${timeLeft})`;
        } else {
          clearInterval(t);
          closeBtn.disabled = false;
          closeBtn.classList.add('enabled');
          closeBtn.textContent = 'Close ↓';
        }
      }, 1000);
    }

    // Initial ad show
    setTimeout(showAd, showDelay);

    // Close with animation and schedule reappearance
    closeBtn.addEventListener('click', () => {
      if (closeBtn.disabled) return;
      adContainer.classList.add('hidden');
      adContainer.setAttribute('aria-hidden', 'true');
      // Schedule reappearance without removing or reloading iframe
      setTimeout(showAd, reappearDelay);
    });
  })();
</script>
