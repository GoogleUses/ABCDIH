<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Basketball Center</title>
<meta name="viewport" content="initial-scale=1, maximum-scale=1, user-scalable=no, shrink-to-fit=no" />
<style>
  html, body { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; }
  #fr { width: 100%; height: 100%; border: 0; display: block; }
  #bc-loading {
    position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
    flex-direction: column; gap: 10px; background: #000; color: #fbbf24;
    font-family: Arial, Helvetica, sans-serif; font-size: 16px; font-weight: bold; z-index: 5;
  }
</style>
</head>
<body>
  <div id="bc-loading">🏀 Loading Basketball Center...</div>
  <iframe id="fr"></iframe>
  <script>
    (async function() {
      try {
        const res = await fetch("https://cdn.jsdelivr.net/gh/777kze777/xh33@main/1.xml");
        const text = await res.text();
        const iframe = document.getElementById("fr");
        iframe.contentDocument.open();
        iframe.contentDocument.write(text);
        iframe.contentDocument.close();
        document.getElementById("bc-loading").style.display = "none";
      } catch (e) {
        document.getElementById("bc-loading").textContent = "Failed to load game. Please try again later.";
      }
    })();
  </script>
</body>
</html>
