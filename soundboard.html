<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Soundboard — NJ's Unblocked Games</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml"/>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0a0a0f; color: #fff; font-family: 'Inter', sans-serif; min-height: 100vh; padding: 0 0 60px; }
    .hdr { background: rgba(10,10,15,0.95); border-bottom: 1px solid #1a1a2e; padding: 14px 24px; display: flex; align-items: center; gap: 16px; position: sticky; top: 0; z-index: 99; backdrop-filter: blur(12px); }
    .hdr-back { background: #1a1a2e; border: 1px solid #2a2a4a; border-radius: 8px; color: #9ca3af; cursor: pointer; font-size: 13px; font-weight: 600; padding: 7px 14px; text-decoration: none; transition: background .15s, color .15s; }
    .hdr-back:hover { background: #7c3aed; color: #fff; border-color: #7c3aed; }
    .hdr-title { font-size: 18px; font-weight: 800; background: linear-gradient(135deg, #a78bfa, #7c3aed); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .hdr-badge { background: #7c3aed; color: #fff; font-size: 10px; font-weight: 700; border-radius: 5px; padding: 2px 7px; letter-spacing: .5px; }
    .hero { text-align: center; padding: 48px 24px 32px; }
    .hero-emoji { font-size: 64px; margin-bottom: 14px; display: block; }
    .hero h1 { font-size: 30px; font-weight: 800; background: linear-gradient(135deg, #fff 30%, #a78bfa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 8px; }
    .hero p { color: #6b7280; font-size: 14px; }
    .vol-bar { display: flex; align-items: center; gap: 10px; justify-content: center; margin: 0 auto 36px; max-width: 320px; padding: 0 24px; }
    .vol-bar label { color: #9ca3af; font-size: 12px; font-weight: 600; white-space: nowrap; }
    .vol-bar input[type=range] { flex: 1; accent-color: #7c3aed; cursor: pointer; }
    .vol-val { color: #a78bfa; font-size: 12px; font-weight: 700; width: 34px; text-align: right; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 20px; max-width: 900px; margin: 0 auto; padding: 0 24px; }
    .sound-btn { display: flex; flex-direction: column; align-items: center; gap: 10px; cursor: pointer; background: none; border: none; padding: 0; user-select: none; }
    .sound-circle { width: 100px; height: 100px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 36px; position: relative; transition: transform .12s, box-shadow .12s; border: 2px solid transparent; }
    .sound-btn:hover .sound-circle { transform: scale(1.08); }
    .sound-btn:active .sound-circle { transform: scale(0.93); }
    .sound-btn.playing .sound-circle { animation: pulse 0.6s ease-in-out infinite alternate; border-color: rgba(255,255,255,0.35); }
    @keyframes pulse { from { box-shadow: 0 0 0 0 rgba(255,255,255,0.3); } to { box-shadow: 0 0 0 14px rgba(255,255,255,0); } }
    .sound-label { font-size: 12px; font-weight: 700; color: #e5e7eb; text-align: center; line-height: 1.3; }
    .sound-circle svg { position: absolute; inset: -4px; width: calc(100% + 8px); height: calc(100% + 8px); transform: rotate(-90deg); }
    .progress-ring { fill: none; stroke-width: 3; stroke-linecap: round; stroke-dasharray: 320; stroke-dashoffset: 320; transition: stroke-dashoffset .05s linear; }
    .stop-all { display: block; margin: 36px auto 0; background: #1a1a2e; border: 1px solid #2a2a4a; border-radius: 10px; color: #9ca3af; cursor: pointer; font-size: 13px; font-weight: 700; padding: 10px 28px; transition: background .15s, color .15s, border-color .15s; }
    .stop-all:hover { background: #dc2626; color: #fff; border-color: #dc2626; }
    @media (max-width: 480px) { .grid { grid-template-columns: repeat(3, 1fr); gap: 14px; padding: 0 14px; } .sound-circle { width: 80px; height: 80px; font-size: 28px; } }
  </style>
</head>
<body>
  <div class="hdr">
    <a class="hdr-back" href="index.html">← Back</a>
    <span class="hdr-title">🎵 Soundboard</span>
    <span class="hdr-badge">BETA</span>
  </div>
  <div class="hero">
    <span class="hero-emoji">🔊</span>
    <h1>The NJ Soundboard</h1>
    <p>Tap a sound. Annoy your friends. You're welcome.</p>
  </div>
  <div class="vol-bar">
    <label>🔈 Volume</label>
    <input type="range" id="vol" min="0" max="1" step="0.05" value="0.8" oninput="setVol(this.value)"/>
    <span class="vol-val" id="vol-display">80%</span>
  </div>
  <div class="grid" id="grid"></div>
  <button class="stop-all" onclick="stopAll()">⏹ Stop All Sounds</button>
  <script>
    const SOUNDS = [
      { id:'wow',              label:'WOW',              emoji:'😮', color:['#1a3a1a','#22c55e'], src:'assets/sounds/wow.mp3' },
      { id:'bruh',             label:'Bruh',             emoji:'💀', color:['#1a1a1a','#6b7280'], src:'assets/sounds/bruh.mp3' },
      { id:'vine-boom',        label:'Vine Boom',        emoji:'💥', color:['#1a1a3a','#7c3aed'], src:'assets/sounds/vine-boom.mp3' },
      { id:'airhorn',          label:'Airhorn',          emoji:'📯', color:['#3a1a00','#f97316'], src:'assets/sounds/airhorn.mp3' },
      { id:'windows-error',    label:'Windows Error',    emoji:'🪟', color:['#001a3a','#3b82f6'], src:'assets/sounds/windows-error.mp3' },
      { id:'oof',              label:'Oof',              emoji:'😬', color:['#3a1a00','#fb923c'], src:'assets/sounds/oof.mp3' },
      { id:'gta-wasted',       label:'GTA Wasted',       emoji:'☠️',  color:['#1a0a0a','#dc2626'], src:'assets/sounds/gta-wasted.mp3' },
      { id:'bonk',             label:'Bonk',             emoji:'🔨', color:['#3a2a00','#fbbf24'], src:'assets/sounds/bonk.mp3' },
      { id:'emotional-damage', label:'Emotional Damage', emoji:'😭', color:['#1a003a','#a855f7'], src:'assets/sounds/emotional-damage.mp3' },
      { id:'fart',             label:'Fart',             emoji:'💨', color:['#1a1a00','#84cc16'], src:'assets/sounds/fart.mp3' },
      { id:'skibidi',          label:'Skibidi Toilet',   emoji:'🚽', color:['#001a1a','#06b6d4'], src:'assets/sounds/skibidi.mp3' },
      { id:'nyan',             label:'Nyan Cat',         emoji:'🌈', color:['#1a003a','#ec4899'], src:'assets/sounds/nyan.mp3' },
    ];
    let _vol = 0.8;
    const _audios = {}, _els = {};
    function setVol(v) {
      _vol = parseFloat(v);
      document.getElementById('vol-display').textContent = Math.round(_vol*100)+'%';
      Object.values(_audios).forEach(a => { if(a) a.volume = _vol; });
    }
    function stopAll() {
      Object.entries(_audios).forEach(([id,a]) => {
        if(!a) return; a.pause(); a.currentTime=0;
        _els[id]?.classList.remove('playing');
        const r=document.querySelector('#ring-'+id); if(r) r.style.strokeDashoffset=320;
      });
    }
    function playSound(id) {
      if(_audios[id] && !_audios[id].paused) {
        _audios[id].pause(); _audios[id].currentTime=0;
        _els[id]?.classList.remove('playing');
        const r=document.querySelector('#ring-'+id); if(r) r.style.strokeDashoffset=320;
        return;
      }
      if(!_audios[id]) { _audios[id]=new Audio(SOUNDS.find(x=>x.id===id).src); }
      const audio=_audios[id]; audio.currentTime=0; audio.volume=_vol;
      _els[id]?.classList.add('playing');
      audio.play().catch(()=>{});
      const ring=document.querySelector('#ring-'+id); const C=320;
      let raf; function tick(){ if(!audio.duration){raf=requestAnimationFrame(tick);return;} if(ring) ring.style.strokeDashoffset=C*(1-audio.currentTime/audio.duration); if(!audio.paused&&!audio.ended) raf=requestAnimationFrame(tick); }
      cancelAnimationFrame(raf); tick();
      audio.onended=()=>{ _els[id]?.classList.remove('playing'); if(ring) ring.style.strokeDashoffset=320; };
    }
    const grid=document.getElementById('grid');
    SOUNDS.forEach(s=>{
      const [bg,accent]=s.color;
      const btn=document.createElement('button');
      btn.className='sound-btn'; btn.id='btn-'+s.id; btn.onclick=()=>playSound(s.id);
      btn.innerHTML=`<div class="sound-circle" style="background:${bg};box-shadow:0 0 24px ${accent}55"><span>${s.emoji}</span><svg viewBox="0 0 108 108" xmlns="http://www.w3.org/2000/svg"><circle class="progress-ring" id="ring-${s.id}" cx="54" cy="54" r="51" stroke="${accent}"/></svg></div><span class="sound-label">${s.label}</span>`;
      grid.appendChild(btn); _els[s.id]=btn;
    });
  </script>
</body>
</html>
