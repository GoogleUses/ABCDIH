<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Soundboard — NJ's Unblocked Games</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0a0a0f; color: #fff; font-family: 'Inter', sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
    .hdr { background: rgba(10,10,15,0.95); border-bottom: 1px solid #1a1a2e; padding: 14px 24px; display: flex; align-items: center; gap: 16px; flex-shrink: 0; backdrop-filter: blur(12px); }
    .hdr a { background: #1a1a2e; border: 1px solid #2a2a4a; border-radius: 8px; color: #9ca3af; font-size: 13px; font-weight: 600; padding: 7px 14px; text-decoration: none; transition: background .15s; }
    .hdr a:hover { background: #7c3aed; color: #fff; border-color: #7c3aed; }
    .hdr-title { font-size: 18px; font-weight: 800; background: linear-gradient(135deg, #a78bfa, #7c3aed); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .frame-wrap { flex: 1; position: relative; }
    .frame-wrap iframe { width: 100%; height: 100%; border: none; display: block; }
  </style>
</head>
<body>
  <div class="hdr">
    <a href="index.html">← Back</a>
    <span class="hdr-title">🎵 Soundboard</span>
  </div>
  <div class="frame-wrap">
    <iframe 
      src="https://voicechanger.easeus.com/soundboards"
      allow="autoplay; microphone"
      allowfullscreen
      title="EaseUS Soundboard"
    ></iframe>
  </div>
</body>
</html>
